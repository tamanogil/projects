<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <div id="imgContainer">
        <img src="images/logo.jpg" alt="">
        </div>
        <div id="notesContainer">
            <div id="notes">
            <h3>Notes:</h3>
            <li>Fields with asterisk(*) are required.</li>
            <li>Put a WORKING e-mail, verification will be sent to your email.</li>
        </div>
        </div>
        <div id="admissionForm">
            <form action="">
                <h4>ADMISSION FORM</h4>
                <label for="Last Name">*Last Name</label>
                <input type="text">
                <label for="First Name">*First Name</label>
                <input type="text">
                <label for="Middle Name">Middle Name</label>
                <input type="text" name="" id="">
                <label for="Suffix">Suffix</label>
                <input type="text" name="" id=""><br>
                <label for="Date of Birth">*Date of Birth</label>
                <input type="date">
                <label for="Email">*Email</label>
                <input type="email" name="" id="">
                <label for="Facebook Account">Facebook Account</label>
                <input type="text" name="" id=""> <br>
                <label for="Country Code">*Country Code</label>
                <select name="Country code" id="">
                    <option value="ph">+63 (Philipines)</option>
                </select>
                <label for="Mobile No.">*Mobile No.</label>
                <input type="number">
                <label for="Tel No.">Tel No.</label>
                <input type="number" name="" id=""> <br>
                <label for="Classified As">*Classified As</label>
                <select name="classified" id="">
                    <option value="status">-STATUS-</option>
                </select>
                <label for="Department">*Department</label>
                <select name="department" id="">
                    <option value="programType">-PROGRAM TYPE-</option>
                </select>
                <label for="Program">*Program</label>
                <select name="program" id="">
                    <option value="program">-PROGRAM-</option>
                </select><br>
                <label for="Last School Attended">Last School Attended</label>
                <select name="lastSchool" id="">
                    <option value="selectSchool">-SELECT SCHOOL-</option>
                </select>
                <label for="School Address">School Address</label>
                <input type="text">
                <label for="School Type">School Type</label>
                <select name="schoolType" id="">
                    <option value=""></option>
                </select><br>
                <label for="Year Level">*Year Level</label>
                <select name="" id="">
                    <option value="">-LEVEL-</option>
                </select>
                <label for="Citezenship">*Citezenship</label>
                <select name="" id="">
                    <option value="citizenship">-CITIZENSHIP</option>
                </select>
                <label for="School Year">*School Year</label>
                <option value="">
                    <select name="" id="">-SELECT SY-</select>
                </option>
                <label for="Semester">Semester</label>
                <option value="">
                    <select name="" id="">-SELECT SEM-</select>
                </option><br>
                <button>Submit Admission Form</button>
            </form>
        </div>
    </div>
</body>
</html>
